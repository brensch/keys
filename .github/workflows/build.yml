name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: windows
            os: windows-latest
            binary: target/release/nocaps.exe
          - name: macos
            os: macos-latest
            binary: target/release/nocaps
          - name: linux
            os: ubuntu-latest
            binary: target/release/nocaps

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --all-targets

      - name: Build
        run: cargo build --verbose --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nocaps-${{ matrix.name }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: git tag -l --format='%(contents)' "${{ github.ref_name }}" > release_notes.txt

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename release files
        run: |
          mkdir release
          mv artifacts/nocaps-windows/nocaps.exe release/nocaps-windows.exe
          mv artifacts/nocaps-macos/nocaps release/nocaps-macos
          mv artifacts/nocaps-linux/nocaps release/nocaps-linux
          chmod +x release/nocaps-macos release/nocaps-linux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: |
            release/nocaps-windows.exe
            release/nocaps-macos
            release/nocaps-linux
